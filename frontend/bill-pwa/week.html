<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8b4513">
  <title>This Week - Bill D'Bettabody</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="page">
    <div class="container">

      <header class="mb-4">
        <div class="flex items-center justify-between">
          <button class="btn btn-secondary" id="back-btn">← Back</button>
          <h1 style="font-size:1.25rem;margin:0;">This Week</h1>
          <button class="help-btn" onclick="helpModal.open('week')" aria-label="How to use this page">?</button>
        </div>
        <p class="text-muted text-center mt-2" id="week-subtitle" style="font-size:0.875rem;"></p>
      </header>

      <div id="week-container">
        <!-- Sessions rendered here -->
      </div>

      <div id="week-empty" hidden>
        <div class="card text-center" style="padding:2rem;">
          <p class="text-muted">No sessions scheduled this week.</p>
          <p class="text-muted" style="font-size:0.875rem;margin-top:0.5rem;">
            Chat with Bill to build your training plan.
          </p>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/week.js"></script>
  <script src="/js/help-content.js"></script>
  <script src="/js/help-modal.js"></script>
</body>
</html>
