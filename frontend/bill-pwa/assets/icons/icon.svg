<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a0f05"/>

  <!-- Brand ring -->
  <rect x="20" y="20" width="472" height="472" rx="76" fill="none" stroke="#d2691e" stroke-width="10"/>

  <!-- Dumbbell bar -->
  <rect x="156" y="238" width="200" height="36" rx="8" fill="#d2691e"/>

  <!-- Left weight plates -->
  <rect x="104" y="196" width="68" height="120" rx="12" fill="#a0522d"/>
  <rect x="80"  y="212" width="32" height="88"  rx="10" fill="#8b4513"/>

  <!-- Right weight plates -->
  <rect x="340" y="196" width="68" height="120" rx="12" fill="#a0522d"/>
  <rect x="400" y="212" width="32" height="88"  rx="10" fill="#8b4513"/>

  <!-- "Bill" wordmark -->
  <text
    x="256" y="400"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62"
    font-weight="700"
    letter-spacing="6"
    text-anchor="middle"
    fill="#f5deb3"
  >BILL</text>
