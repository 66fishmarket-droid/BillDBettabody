<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8b4513">

  <title>Active Session - Bill D'Bettabody</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="page">
    <div class="container">

      <header class="mb-4">
        <div class="flex items-center justify-between">
          <button class="btn btn-secondary" id="back-btn">← Back</button>
          <button class="btn btn-secondary" id="ask-bill-btn">💬 Ask Bill</button>
        </div>
      </header>

      <div class="card mb-3">
        <h1 class="text-2xl font-bold mb-1" id="session-title">Active Session</h1>
        <p class="text-muted" id="session-subtitle"></p>
      </div>

      <div id="steps-container">
        <!-- Steps rendered here -->
      </div>

      <div class="card mb-4">
        <h3 class="font-semibold mb-2">Session Feedback</h3>
        <label class="block text-sm text-muted mb-1" for="session-rpe">Overall RPE (1-10)</label>
        <input id="session-rpe" type="number" min="1" max="10"
               class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg text-white mb-3" />

        <label class="block text-sm text-muted mb-1" for="session-notes">Notes</label>
        <textarea id="session-notes" rows="3"
                  class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg text-white"></textarea>
      </div>

      <button class="btn btn-primary btn-block btn-large mb-4" id="complete-session-btn">
        Complete Session
      </button>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/session-active.js"></script>
</body>
</html>
