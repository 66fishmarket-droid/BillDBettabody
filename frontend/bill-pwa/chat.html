<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="description" content="Chat with Bill D'Bettabody">

  <title>Chat — Bill D'Bettabody</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="chat-page">

    <!-- Header -->
    <header class="chat-header">
      <button class="chat-header-back" id="back-btn" aria-label="Back to dashboard">&#8592;</button>
      <div class="chat-header-info">
        <img src="/assets/bill-portrait.png" alt="Bill D'Bettabody" class="chat-header-avatar">
        <div>
          <p class="chat-header-name">Bill D'Bettabody</p>
          <p class="chat-header-status" id="bill-status">Online</p>
        </div>
      </div>
    </header>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <!-- Populated by chat.js -->
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <a href="/dashboard.html" class="chat-bottom-back-btn" aria-label="Back to dashboard">&#8592;</a>
      <textarea
        id="chat-input"
        class="chat-input"
        placeholder="Message Bill..."
        rows="1"
        aria-label="Message input"
      ></textarea>
      <button class="chat-send-btn" id="send-btn" aria-label="Send message">
        &#10148;
      </button>
    </div>

  </div>

  <script src="/js/mock-data.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
