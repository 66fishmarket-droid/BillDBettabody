name: Test Google Sheets Connection

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches:
      - develop

jobs:
  test-connection:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install gspread oauth2client pandas openpyxl
      
      - name: Test connection to Google Sheets
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SHEET_ID: ${{ secrets.EXERCISE_LIBRARY_SHEET_ID }}
          SHEET_NAME: ${{ secrets.EXERCISE_LIBRARY_SHEET_NAME }}
        run: |
          python - <<'EOF'
          import json
          import os
          import gspread
          from oauth2client.service_account import ServiceAccountCredentials
          import pandas as pd
          
          print("=" * 80)
          print("TESTING GOOGLE SHEETS API CONNECTION")
          print("=" * 80)
          
          # 1. Check environment variables
          print("\n1. Checking environment variables...")
          creds_json = os.environ.get('GOOGLE_CREDENTIALS')
          sheet_id = os.environ.get('SHEET_ID')
          sheet_name = os.environ.get('SHEET_NAME', 'Exercises_Library')
          
          if not creds_json:
              print("❌ ERROR: GOOGLE_CREDENTIALS secret not found")
              exit(1)
          if not sheet_id:
              print("❌ ERROR: SHEET_ID secret not found")
              exit(1)
          
          print(f"✅ GOOGLE_CREDENTIALS: Found ({len(creds_json)} characters)")
          print(f"✅ SHEET_ID: {sheet_id}")
          print(f"✅ SHEET_NAME: {sheet_name}")
          
          # 2. Parse credentials
          print("\n2. Parsing credentials JSON...")
          try:
              creds_dict = json.loads(creds_json)
              print(f"✅ JSON parsed successfully")
              print(f"   Service account email: {creds_dict.get('client_email', 'NOT FOUND')}")
              print(f"   Project ID: {creds_dict.get('project_id', 'NOT FOUND')}")
          except json.JSONDecodeError as e:
              print(f"❌ ERROR: Invalid JSON in credentials: {e}")
              exit(1)
          
          # 3. Authorize with Google
          print("\n3. Authorizing with Google Sheets API...")
          try:
              scope = [
                  'https://spreadsheets.google.com/feeds',
                  'https://www.googleapis.com/auth/drive'
              ]
              credentials = ServiceAccountCredentials.from_json_keyfile_dict(creds_dict, scope)
              client = gspread.authorize(credentials)
              print("✅ Authorization successful")
          except Exception as e:
              print(f"❌ ERROR: Authorization failed: {e}")
              exit(1)
          
          # 4. Open the spreadsheet
          print("\n4. Opening spreadsheet...")
          try:
              spreadsheet = client.open_by_key(sheet_id)
              print(f"✅ Spreadsheet opened: '{spreadsheet.title}'")
          except gspread.exceptions.SpreadsheetNotFound:
              print(f"❌ ERROR: Spreadsheet not found with ID: {sheet_id}")
              print("   Check that the ID is correct and the sheet is shared with the service account")
              exit(1)
          except gspread.exceptions.APIError as e:
              print(f"❌ ERROR: API error: {e}")
              exit(1)
          
          # 5. Open the specific worksheet
          print(f"\n5. Opening worksheet '{sheet_name}'...")
          try:
              worksheet = spreadsheet.worksheet(sheet_name)
              print(f"✅ Worksheet opened: '{worksheet.title}'")
          except gspread.exceptions.WorksheetNotFound:
              print(f"❌ ERROR: Worksheet '{sheet_name}' not found")
              print(f"   Available worksheets: {[ws.title for ws in spreadsheet.worksheets()]}")
              exit(1)
          
          # 6. Fetch data
          print("\n6. Fetching exercise data...")
          try:
              data = worksheet.get_all_records()
              df = pd.DataFrame(data)
              print(f"✅ Data fetched successfully")
              print(f"   Total exercises: {len(df)}")
              print(f"   Total columns: {len(df.columns)}")
          except Exception as e:
              print(f"❌ ERROR: Failed to fetch data: {e}")
              exit(1)
          
          # 7. Validate data structure
          print("\n7. Validating data structure...")
          required_columns = ['exercise_id', 'exercise_name', 'category', 'body_region', 
                             'movement_pattern', 'equipment']
          missing_columns = [col for col in required_columns if col not in df.columns]
          
          if missing_columns:
              print(f"❌ WARNING: Missing expected columns: {missing_columns}")
              print(f"   Available columns: {list(df.columns)[:10]}...")
          else:
              print(f"✅ All required columns present")
          
          # 8. Show sample data
          print("\n8. Sample data (first 3 exercises):")
          print("-" * 80)
          sample_cols = ['exercise_id', 'exercise_name', 'category', 'equipment']
          available_cols = [col for col in sample_cols if col in df.columns]
          print(df[available_cols].head(3).to_string(index=False))
          
          # 9. Summary
          print("\n" + "=" * 80)
          print("CONNECTION TEST COMPLETE")
          print("=" * 80)
          print("✅ All checks passed!")
          print(f"✅ Successfully connected to Exercise Library")
          print(f"✅ Found {len(df)} exercises ready for processing")
          print("\nYou're ready to proceed with the full GitHub Action setup.")
          
          EOF
